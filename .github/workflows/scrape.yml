name: Scrape Otodom

on:
  schedule:
    - cron: '0 7 * * *'   # codziennie o 8:00 czasu polskiego (7:00 UTC)
  workflow_dispatch:        # możliwość ręcznego uruchomienia

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Zainstaluj zależności
        run: pip install requests

      - name: Uruchom scraper
        run: python scraper/scrape.py

      - name: Zapisz wyniki do repozytorium
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/listings.json
          git diff --staged --quiet || git commit -m "chore: aktualizacja ogłoszeń $(date -u '+%Y-%m-%d')"
          git push
