<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kawalerki Wrocław – wynajem</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #f0f4f2;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 32px 16px 48px;
    max-width: 780px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }
  header h1 {
    font-size: 1.8rem;
    font-weight: 800;
    color: #009051;
    margin-bottom: 6px;
  }
  header p {
    color: #666;
    font-size: .9rem;
  }

  .meta {
    font-size: .82rem;
    color: #888;
    margin-bottom: 20px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .meta strong { color: #444; }
  .dot { color: #ccc; }

  .listing {
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,.08);
    overflow: hidden;
    display: flex;
    margin-bottom: 18px;
    transition: box-shadow .2s;
    text-decoration: none;
    color: inherit;
  }
  .listing:hover { box-shadow: 0 6px 24px rgba(0,0,0,.14); }

  .listing img {
    width: 210px;
    min-height: 155px;
    object-fit: cover;
    flex-shrink: 0;
    background: #e8f5ee;
  }
  .no-photo {
    width: 210px;
    min-height: 155px;
    background: #e8f5ee;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.8rem;
    flex-shrink: 0;
  }

  .info {
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex: 1;
  }
  .num {
    font-size: .72rem;
    font-weight: 700;
    color: #009051;
    text-transform: uppercase;
    letter-spacing: .4px;
  }
  .title {
    font-size: .98rem;
    font-weight: 700;
    line-height: 1.35;
    color: #1a1a1a;
  }
  .price {
    font-size: 1.2rem;
    font-weight: 800;
    color: #009051;
    margin-top: 2px;
  }
  .details {
    font-size: .82rem;
    color: #666;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 2px;
  }
  .see-btn {
    display: inline-block;
    margin-top: auto;
    padding-top: 8px;
    font-size: .83rem;
    font-weight: 600;
    color: #009051;
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: #999;
    font-size: .95rem;
  }

  footer {
    text-align: center;
    font-size: .78rem;
    color: #bbb;
    margin-top: 24px;
  }

  @media (max-width: 560px) {
    .listing { flex-direction: column; }
    .listing img, .no-photo { width: 100%; min-height: 180px; }
  }
</style>
</head>
<body>

<header>
  <h1>🏠 Kawalerki Wrocław – wynajem</h1>
  <p>Automatycznie pobierane z otodom.pl · odświeżane codziennie</p>
</header>

<div id="meta" class="meta"></div>
<div id="listings"></div>

<footer>otodom-scraper · GitHub Actions + Vercel</footer>

<script>
  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    try {
      return new Date(iso).toLocaleString('pl-PL', {
        day:'2-digit', month:'2-digit', year:'numeric',
        hour:'2-digit', minute:'2-digit', timeZone:'Europe/Warsaw'
      });
    } catch { return iso; }
  }

  fetch('/data/listings.json')
    .then(r => r.json())
    .then(data => {
      const list = data.ogloszenia || [];

      document.getElementById('meta').innerHTML =
        `<span>📅 Aktualizacja: <strong>${fmtDate(data.data_pobrania)}</strong></span>` +
        `<span class="dot">·</span>` +
        `<span>Ogłoszeń: <strong>${list.length}</strong></span>`;

      if (!list.length) {
        document.getElementById('listings').innerHTML =
          '<div class="empty">Brak ogłoszeń – dane pojawią się po pierwszym automatycznym scrapingu.</div>';
        return;
      }

      document.getElementById('listings').innerHTML = list.map(o => `
        <a class="listing" href="${esc(o.url)}" target="_blank" rel="noopener">
          ${o.miniatura
            ? `<img src="${esc(o.miniatura)}" alt="" loading="lazy">`
            : `<div class="no-photo">🏠</div>`}
          <div class="info">
            <span class="num">#${o.numer}</span>
            <div class="title">${esc(o.tytul)}</div>
            <div class="price">💰 ${esc(o.cena)}</div>
            <div class="details">
              ${o.powierzchnia ? `<span>📐 ${esc(o.powierzchnia)}</span>` : ''}
              ${o.cena_za_m2   ? `<span>📊 ${esc(o.cena_za_m2)}</span>`   : ''}
              ${o.adres        ? `<span>📍 ${esc(o.adres)}</span>`         : ''}
            </div>
            <span class="see-btn">Zobacz ogłoszenie →</span>
          </div>
        </a>
      `).join('');
    })
    .catch(() => {
      document.getElementById('listings').innerHTML =
        '<div class="empty">❌ Nie udało się załadować danych.</div>';
    });
</script>

</body>
</html>
